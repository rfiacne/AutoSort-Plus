<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AutoSort+ Ollama</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #e3f2fd;
            text-align: right;
        }
        .ai-message {
            background-color: #f5f5f5;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
        }
        #response {
            min-height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #status {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>AutoSort+ - Ollama Chat</h2>
    <div id="messages"></div>
    <div id="response"></div>
    <div id="status">Initializing...</div>
    <script src="ollama-popup.js" type="module"></script>
</body>
</html>
